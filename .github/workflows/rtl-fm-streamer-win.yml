name: Build Windows FM Player and GUI

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Setup MSYS2 and Install Windows Dependencies
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          git
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-libusb
          mingw-w64-x86_64-SDL2

    - name: Clone Windows-Compatible Fork with Submodules
      # The --recursive flag is the crucial fix here!
      run: git clone --recursive https://github.com/Mr-Precise/rtl_fm_sdlplayer.git

    - name: Build the C Executable
      run: |
        cd rtl_fm_sdlplayer
        mkdir build
        cd build
        cmake -G "MinGW Makefiles" ..
        cmake --build .

    - name: Package Base Binaries and DLLs
      run: |
        mkdir release_package
        # Copy the compiled FM player
        cp rtl_fm_sdlplayer/build/*.exe release_package/ || true
        
        # Copy necessary runtime DLLs
        cp /mingw64/bin/libusb-1.0.dll release_package/ || true
        cp /mingw64/bin/SDL2.dll release_package/ || true
        cp /mingw64/bin/libwinpthread-1.dll release_package/ || true
        cp /mingw64/bin/libgcc_s_seh-1.dll release_package/ || true
        cp /mingw64/bin/libstdc++-6.dll release_package/ || true

    - name: Create and Compile C# GUI Wrapper
      shell: pwsh
      run: |
        $guiCode = @"
        using System;
        using System.Diagnostics;
        using System.Windows.Forms;
        using System.Drawing;
        using System.IO;

        class App : Form {
            TextBox freqInput;
            Button startBtn;
            Process player;
            string exeName = "";

            public App() {
                Text = "RTL FM Radio GUI";
                Size = new Size(320, 160);
                FormBorderStyle = FormBorderStyle.FixedDialog;
                StartPosition = FormStartPosition.CenterScreen;
                MaximizeBox = false;

                if (File.Exists("rtl_fm_player.exe")) exeName = "rtl_fm_player.exe";
                else if (File.Exists("rtl_fm_sdlplayer.exe")) exeName = "rtl_fm_sdlplayer.exe";

                Label l1 = new Label() { Text = "Frequency (MHz):", Top = 20, Left = 20, Width = 100 };
                freqInput = new TextBox() { Text = "93.2", Top = 20, Left = 120, Width = 140 };

                startBtn = new Button() { Text = "Play Radio", Top = 60, Left = 20, Width = 240, Height = 35 };
                startBtn.Click += Start_Click;

                Controls.Add(l1); Controls.Add(freqInput);
                Controls.Add(startBtn);
                
                FormClosing += (s,e) => { StopPlayer(); };
            }

            void StopPlayer() {
                if(player != null && !player.HasExited) {
                    player.Kill();
                }
            }

            void Start_Click(object sender, EventArgs e) {
                if (exeName == "") {
                    MessageBox.Show("Could not find the underlying RTL executable.", "Error", MessageBoxButtons.OK, MessageBoxIcon.Error);
                    return;
                }

                if(player != null && !player.HasExited) {
                    StopPlayer();
                    startBtn.Text = "Play Radio";
                    return;
                }
                
                try {
                    string freqStr = freqInput.Text.Replace(".", "").Replace(",", "");
                    if(freqStr.Length < 8) freqStr = freqStr.PadRight(8, '0');
                    
                    player = new Process();
                    player.StartInfo.FileName = exeName;
                    player.StartInfo.Arguments = $"-f {freqStr}";
                    player.StartInfo.UseShellExecute = false;
                    player.StartInfo.CreateNoWindow = true; 
                    player.Start();
                    
                    startBtn.Text = "Stop Radio";
                } catch (Exception ex) {
                    MessageBox.Show("Error starting playback.\n" + ex.Message, "Error", MessageBoxButtons.OK, MessageBoxIcon.Error);
                }
            }

            static void Main() {
                Application.EnableVisualStyles();
                Application.Run(new App());
            }
        }
        "@
        Set-Content -Path GuiWrapper.cs -Value $guiCode
        # Compile the C# GUI directly into the release folder
        & "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe" /target:winexe /out:release_package\RTL_Radio_GUI.exe GuiWrapper.cs

    - name: Upload Finished Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rtl_fm_radio-GUI-Windows-x64
        path: release_package/
