name: Build Original Streamer and GUI

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Setup MSYS2 and Install Base Dependencies
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        # Added make and diffutils to prevent missing command errors
        install: >-
          git
          make
          diffutils
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-libusb
          mingw-w64-x86_64-rtl-sdr

    - name: Build and Install libev from Source
      run: |
        curl -O http://dist.schmorp.de/libev/libev-4.33.tar.gz
        tar -xzf libev-4.33.tar.gz
        cd libev-4.33
        
        export CFLAGS="-std=gnu99 -Wno-implicit-function-declaration -Wno-incompatible-pointer-types"
        
        # Added --disable-dependency-tracking to fix the config.status crash
        ./configure --prefix=/mingw64 --host=x86_64-w64-mingw32 --disable-dependency-tracking
        make
        make install

    - name: Clone Original AlbrechtL Repository
      run: git clone https://github.com/AlbrechtL/rtl_fm_streamer.git

    - name: Build rtl_fm_streamer
      run: |
        cd rtl_fm_streamer
        mkdir build
        cd build
        
        cmake -G "MinGW Makefiles" -DCMAKE_C_STANDARD=99 -DCMAKE_C_FLAGS="-std=gnu99 -Wno-incompatible-pointer-types" ..
        cmake --build .

    - name: Package Base Binaries and DLLs
      run: |
        mkdir release_package
        # Copy the newly compiled streamer
        cp rtl_fm_streamer/build/rtl_fm_streamer.exe release_package/ || true
        
        # Copy necessary runtime DLLs
        cp /mingw64/bin/librtlsdr.dll release_package/ || true
        cp /mingw64/bin/libusb-1.0.dll release_package/ || true
        cp /mingw64/bin/libwinpthread-1.dll release_package/ || true
        cp /mingw64/bin/libgcc_s_seh-1.dll release_package/ || true
        cp /mingw64/bin/libstdc++-6.dll release_package/ || true

    - name: Create and Compile C# GUI Wrapper
      shell: pwsh
      run: |
        $guiCode = @"
        using System;
        using System.Diagnostics;
        using System.Windows.Forms;
        using System.Drawing;
        using System.IO;

        class App : Form {
            TextBox freqInput;
            ComboBox modeSelect;
            Button startBtn;
            Process streamer;

            public App() {
                Text = "RTL Network Streamer GUI";
                Size = new Size(320, 220);
                FormBorderStyle = FormBorderStyle.FixedDialog;
                StartPosition = FormStartPosition.CenterScreen;
                MaximizeBox = false;

                Label l1 = new Label() { Text = "Frequency (MHz):", Top = 20, Left = 20, Width = 100 };
                freqInput = new TextBox() { Text = "93.2", Top = 20, Left = 120, Width = 140 };

                Label l2 = new Label() { Text = "Mode:", Top = 60, Left = 20, Width = 100 };
                modeSelect = new ComboBox() { Top = 60, Left = 120, Width = 140, DropDownStyle = ComboBoxStyle.DropDownList };
                modeSelect.Items.AddRange(new string[] { "Mono (0)", "Stereo (1)" });
                modeSelect.SelectedIndex = 1; // Default to Stereo

                startBtn = new Button() { Text = "Launch Streamer", Top = 110, Left = 20, Width = 240, Height = 40 };
                startBtn.Click += Start_Click;

                Controls.Add(l1); Controls.Add(freqInput);
                Controls.Add(l2); Controls.Add(modeSelect);
                Controls.Add(startBtn);
                
                FormClosing += (s,e) => { StopStreamer(); };
            }

            void StopStreamer() {
                if(streamer != null && !streamer.HasExited) {
                    streamer.Kill();
                }
            }

            void Start_Click(object sender, EventArgs e) {
                if (!File.Exists("rtl_fm_streamer.exe")) {
                    MessageBox.Show("Could not find rtl_fm_streamer.exe in the same folder.", "Error", MessageBoxButtons.OK, MessageBoxIcon.Error);
                    return;
                }

                if(streamer != null && !streamer.HasExited) {
                    StopStreamer();
                    startBtn.Text = "Launch Streamer";
                    return;
                }
                
                try {
                    string freqStr = freqInput.Text.Replace(".", "").Replace(",", "");
                    if(freqStr.Length < 8) freqStr = freqStr.PadRight(8, '0');
                    
                    string mode = modeSelect.SelectedIndex == 0 ? "0" : "1";
                    string url = $"http://localhost:2346/{freqStr}/{mode}";
                    
                    streamer = new Process();
                    streamer.StartInfo.FileName = "rtl_fm_streamer.exe";
                    streamer.StartInfo.Arguments = "-P 2346"; 
                    streamer.StartInfo.UseShellExecute = true;
                    streamer.StartInfo.WindowStyle = ProcessWindowStyle.Minimized;
                    streamer.Start();
                    
                    startBtn.Text = "Stop Streamer";
                    MessageBox.Show($"The streamer is running in the background!\n\n1. Open VLC Media Player\n2. Press Ctrl+N (Open Network Stream)\n3. Paste this exact URL:\n\n{url}\n\n4. Click Play", "Streamer Active", MessageBoxButtons.OK, MessageBoxIcon.Information);
                    
                } catch (Exception ex) {
                    MessageBox.Show("Error starting streamer.\n" + ex.Message, "Error", MessageBoxButtons.OK, MessageBoxIcon.Error);
                }
            }

            static void Main() {
                Application.EnableVisualStyles();
                Application.Run(new App());
            }
        }
        "@
        Set-Content -Path GuiWrapper.cs -Value $guiCode
        # Compile the C# GUI directly into the release folder
        & "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe" /target:winexe /out:release_package\RTL_Network_Stream_GUI.exe GuiWrapper.cs

    - name: Upload Finished Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rtl_fm_streamer-GUI-Windows-x64
        path: release_package/
