name: Build Edge 60 Fusion Custom Modules

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc libelf-dev bison flex libssl-dev lld llvm

      - name: Download Android Clang 17.0.2 Toolchain
        run: |
          git clone --depth 1 --branch android14-release --filter=blob:none --sparse https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 android-clang
          cd android-clang
          git sparse-checkout set clang-r487747c

      - name: Clone Motorola Kernel Source
        run: |
          git clone --depth 1 --branch MMI-W1VCS36H.14-20-19-3 https://github.com/MotorolaMobilityLLC/kernel-mtk.git kernel-source

      - name: Configure and Compile Modules
        run: |
          export CLANG_DIR="${GITHUB_WORKSPACE}/android-clang/clang-r487747c"
          cp .config kernel-source/.config
          cd kernel-source
          
          echo "[*] Injecting configuration bypasses..."
          
          # 1. Bypass GKI ABI & Symbol Trimming
          touch abi_symbollist.raw
          echo "# CONFIG_TRIM_UNUSED_KSYMS is not set" >> .config
          
          # 2. Disable Version Checking (Fixes 'Invalid argument')
          echo "# CONFIG_MODVERSIONS is not set" >> .config
          
          # 3. Disable Control Flow Integrity (Fixes Kernel Panic / Reboot)
          echo "# CONFIG_CFI_CLANG is not set" >> .config
          echo "CONFIG_CFI_PERMISSIVE=y" >> .config
          echo "CONFIG_MODULE_SIG=n" >> .config
          
          # 4. Enable Modules
          echo "CONFIG_PPP_ASYNC=m" >> .config
          echo "CONFIG_PPPOE=m" >> .config
          echo "CONFIG_MEDIA_SUPPORT=m" >> .config
          echo "CONFIG_DVB_CORE=m" >> .config
          echo "CONFIG_MEDIA_USB_SUPPORT=y" >> .config
          echo "CONFIG_DVB_USB_V2=m" >> .config
          echo "CONFIG_DVB_USB_RTL28XXU=m" >> .config
          echo "CONFIG_DVB_RTL2830=m" >> .config
          echo "CONFIG_DVB_RTL2832=m" >> .config
          echo "CONFIG_DVB_RTL2832_SDR=m" >> .config
          echo "CONFIG_CDROM=m" >> .config
          echo "CONFIG_BLK_DEV_SR=m" >> .config
          echo "CONFIG_ISO9660_FS=m" >> .config
          echo "CONFIG_UDF_FS=m" >> .config

          MAKE_ARGS="ARCH=arm64 SUBARCH=arm64 LLVM=1 LLVM_IAS=1 \
          CC=${CLANG_DIR}/bin/clang \
          LD=${CLANG_DIR}/bin/ld.lld \
          AR=${CLANG_DIR}/bin/llvm-ar \
          NM=${CLANG_DIR}/bin/llvm-nm \
          OBJCOPY=${CLANG_DIR}/bin/llvm-objcopy \
          OBJDUMP=${CLANG_DIR}/bin/llvm-objdump \
          STRIP=${CLANG_DIR}/bin/llvm-strip"

          echo "[*] Applying config modifications..."
          make $MAKE_ARGS olddefconfig
          make $MAKE_ARGS modules_prepare
          
          echo "[*] Compiling ONLY the target modules..."
          # Στοχευμένο build μόνο στους φακέλους που χρειαζόμαστε
          make $MAKE_ARGS M=drivers/net/ppp modules -j$(nproc)
          make $MAKE_ARGS M=drivers/media modules -j$(nproc)
          make $MAKE_ARGS M=drivers/cdrom modules -j$(nproc)
          make $MAKE_ARGS M=drivers/scsi modules -j$(nproc)
          make $MAKE_ARGS M=fs/isofs modules -j$(nproc)
          make $MAKE_ARGS M=fs/udf modules -j$(nproc)
          
          echo "[*] Collecting generated .ko files..."
          mkdir -p ../compiled-modules
          find drivers/net/ppp drivers/media drivers/cdrom drivers/scsi fs/isofs fs/udf -name "*.ko" -exec cp {} ../compiled-modules/ \;

      - name: Upload Compiled Modules
        uses: actions/upload-artifact@v4
        with:
          name: Edge60-Fusion-Custom-Modules
          path: compiled-modules/
