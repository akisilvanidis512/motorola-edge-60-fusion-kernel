name: Build Edge 60 Fusion Custom Modules

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc libelf-dev bison flex libssl-dev

      - name: Download Android Clang Toolchain
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 android-clang
          cd android-clang
          git sparse-checkout set clang-r416183b

      - name: Clone Motorola Kernel Source
        run: |
          git clone --depth 1 --branch MMI-W1VCS36H.14-20-19-3 https://github.com/MotorolaMobilityLLC/kernel-mtk.git kernel-source

      - name: Configure and Compile Modules
        run: |
          # 1. Set up Clang environment
          export CLANG_DIR="${GITHUB_WORKSPACE}/android-clang/clang-r416183b"
          export PATH="${CLANG_DIR}/bin:${PATH}"
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          
          # 2. Copy your device base .config into the tree
          cp .config kernel-source/.config
          cd kernel-source
          
          # 3. Inject missing configs for your specific hardware features
          echo "[*] Injecting custom module configurations..."
          
          # PPPoE Modules
          echo "CONFIG_PPP=m" >> .config
          echo "CONFIG_PPP_ASYNC=m" >> .config
          echo "CONFIG_PPPOE=m" >> .config
          
          # RTL-SDR & DVB-T/T2/DAB/FM (Crypto ReDi PC 50 / RTL2832U)
          echo "CONFIG_MEDIA_SUPPORT=m" >> .config
          echo "CONFIG_MEDIA_DIGITAL_TV_SUPPORT=y" >> .config
          echo "CONFIG_MEDIA_RADIO_SUPPORT=y" >> .config
          echo "CONFIG_MEDIA_SDR_SUPPORT=y" >> .config
          echo "CONFIG_MEDIA_USB_SUPPORT=y" >> .config
          echo "CONFIG_DVB_USB_V2=m" >> .config
          echo "CONFIG_DVB_USB_RTL28XXU=m" >> .config
          echo "CONFIG_DVB_RTL2830=m" >> .config
          echo "CONFIG_DVB_RTL2832=m" >> .config
          echo "CONFIG_DVB_RTL2832_SDR=m" >> .config
          
          # Blu-ray / DVD / CDFS Support (/dev/sr0)
          echo "CONFIG_CDROM=m" >> .config
          echo "CONFIG_BLK_DEV_SR=m" >> .config
          echo "CONFIG_ISO9660_FS=m" >> .config
          echo "CONFIG_UDF_FS=m" >> .config

          # 4. Process config and prepare headers
          echo "[*] Applying config modifications..."
          make LLVM=1 LLVM_IAS=1 olddefconfig
          make LLVM=1 LLVM_IAS=1 modules_prepare
          
          # 5. Compile ONLY the modules (skips core kernel Image compilation)
          echo "[*] Compiling target modules..."
          make LLVM=1 LLVM_IAS=1 modules -j$(nproc)
          
          # 6. Gather all compiled .ko files from the source tree
          echo "[*] Collecting generated .ko files..."
          mkdir -p ../compiled-modules
          find . -name "*.ko" -exec cp {} ../compiled-modules/ \;

      - name: Upload Compiled Modules
        uses: actions/upload-artifact@v4
        with:
          name: Edge60-Fusion-Custom-Modules
          path: compiled-modules/
